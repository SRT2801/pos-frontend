<div class="flex-1 flex items-center justify-center p-2">
  <div
    class="w-full max-w-120 bg-white bg-white:bg-slate-900 rounded-xl shadow-xl border border-slate-200  overflow-hidden">
    <div class="p-8 md:p-10">
      <!-- Header Section -->
      <div class="flex flex-col gap-3 mb-8 text-center">
        <h1 class="text-black  text-3xl font-black leading-tight tracking-[-0.033em]">Welcome
          Back</h1>
        <p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal">Sign in to continue shopping
        </p>
      </div>
      <!-- Login Form -->
      <form class="flex flex-col gap-5">
        <!-- Email Input -->
        <div class="flex flex-col gap-2">
          <label class="text-black  text-sm font-semibold leading-normal" for="email">Email
            Address</label>
          <input
            class="form-input w-full rounded-lg text  border border-slate-200  bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 px-4 text-base font-normal placeholder:text-slate-400"
            id="email" name="email" placeholder="email@example.com" type="email" />
        </div>
        <!-- Password Input -->
        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <label class="text-black  text-sm font-semibold leading-normal" for="password">Password</label>
            <a class="text-blue-700 text-sm font-medium hover:underline" href="#">Forgot password?</a>
          </div>
          <div class="relative flex items-center">
            <input
              class="form-input w-full rounded-lg text  border border-slate-200  bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 pl-4 pr-12 text-base font-normal placeholder:text-slate-400"
              id="password" name="password" placeholder="Enter your password" type="password" />
            <button
              class="absolute right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 flex items-center justify-center"
              type="button">
              <i class="pi pi-eye"></i>
            </button>
          </div>
        </div>
        <!-- Remember Me (Optional addition for modern UI) -->
        <div class="flex items-center gap-2 py-1">
          <input class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary h-4 w-4"
            id="remember" type="checkbox" />
          <label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Keep me signed in</label>
        </div>
        <!-- Primary Login Button -->
        <button
          class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-4 bg-blue-800 text-black text-base font-bold leading-normal tracking-[0.015em] hover:bg-blue-500 transition-all shadow-md active:scale-[0.98]"
          type="submit">
          <span class="truncate text-amber-50">Sign In</span>
        </button>
      </form>
      <!-- Divider -->
      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
          <span class="w-full border-t border-slate-200 dark:border-slate-400"></span>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-white px-2  text-slate-400">Or continue with</span>
        </div>
      </div>
      <!-- Social Login -->
      <div class="grid grid-cols-2 gap-4">
        <button
          class="flex items-center justify-center gap-2 rounded-lg border border-slate-200  h-12 px-4 hover:bg-blue-700 transition-colors">
          <i class="pi pi-google text-lg"></i>
          <span class="text-sm font-semibold">Google</span>
        </button>
        <button
          class="flex items-center justify-center gap-2 rounded-lg border border-slate-200  h-12 px-4 hover:bg-blue-700 transition-colors">
          <i class="pi pi-facebook text-lg"></i>
          <span class="text-sm font-semibold">Facebook</span>
        </button>
      </div>
      <!-- Sign Up Link -->
      <p class="mt-8 text-center text-slate-600  text-sm">
        Don't have an account?
        <a class="text-primary text-blue-700 font-bold hover:underline" href="/register">Sign up for free</a>
      </p>
    </div>
  </div>
</div>
