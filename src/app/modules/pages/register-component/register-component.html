<form (submit)="register(); $event.preventDefault()">
  <input type="email" [(ngModel)]="email" name="email" required />
  <input class="border-amber-200" type="password" [(ngModel)]="password" name="password" required />
  <p-button label="Register" type="submit"></p-button>
  <div *ngIf="error">{{ error }}</div>
</form>
