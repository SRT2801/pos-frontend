<app-progress-spinner *ngIf="spinner.visible()" />
<p-toast />
<div class="flex h-screen flex-col overflow-hidden">
  <app-header></app-header>
  @if (!isMinimalLayout()) {
  <div class="flex min-h-0 flex-1">
    <app-sidebar ngSkipHydration></app-sidebar>
    <main class="min-h-0 flex-1 overflow-y-auto bg-gray-50 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
  } @else {
  <main class="flex min-h-0 flex-1 flex-col overflow-auto">
    <router-outlet></router-outlet>
  </main>
  }
</div>
