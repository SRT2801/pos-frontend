<div class="bg-white rounded-xl shadow-sm border border-slate-200/60 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-100">
              <ng-container *ngTemplateOutlet="headerTemplate"></ng-container>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            @for (item of data; track item.id || $index) {
              <tr class="hover:bg-slate-50 transition-colors group">
                <ng-container *ngTemplateOutlet="rowTemplate; context: { $implicit: item }"></ng-container>
              </tr>
            }
            @if (!data || data.length === 0) {
              <tr>
                <td [attr.colspan]="columnsCount" class="px-6 py-12 text-center text-slate-500 text-sm">
                  <div class="flex flex-col items-center justify-center">
                    <i class="pi pi-inbox text-3xl mb-3 text-slate-300"></i>
                    No hay datos disponibles
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
