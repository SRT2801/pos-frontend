<aside
  class="w-full lg:w-72 h-full bg-slate-50 border-r border-slate-200 flex flex-col shadow-sm transition-all duration-300">


  <div class="flex items-center gap-3 p-6 border-b border-slate-200">
    <p-avatar icon="pi pi-briefcase" shape="circle" class="shadow-sm"></p-avatar>
    <div class="flex flex-col">


      @if (authService.currentStoreContext()) {
      <span class="text-sm text-slate-500">
        {{ authService.currentStoreContext()?.name }}
        <span class="text-xs font-semibold px-1 ml-1 bg-indigo-100 text-indigo-700 rounded">
          {{ authService.currentStoreContext()?.role }}
        </span>
      </span>
      } @else {
      <span class="text-sm text-slate-500">Workspace Principal</span>
      }
    </div>
  </div>


  <nav class="flex flex-col gap-1 p-4 flex-1 overflow-y-auto w-full" role="navigation"
    aria-label="Navegación principal">


    <ng-container *ngFor="let option of visibleOptions()">

      <!-- Atom: Standard Link -->
      <ng-container *ngIf="!option.children">
        <a [routerLink]="option.route" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors duration-200 min-h-11 outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
          tabindex="0" [attr.aria-label]="option.label">
          <i class="pi text-lg" [ngClass]="option.icon"></i>
          <span class="text-[0.9375rem]">{{ option.label }}</span>
        </a>
      </ng-container>

      <!-- Molecule: Expandable Group -->
      <ng-container *ngIf="option.children">
        <button
          class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors duration-200 min-h-11 outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 cursor-pointer text-left"
          (click)="toggleSubmenu(option)" [attr.aria-expanded]="isSubmenuOpen(option)"
          [attr.aria-label]="isSubmenuOpen(option) ? 'Cerrar menú de ' + option.label : 'Abrir menú de ' + option.label">
          <div class="flex items-center gap-3">
            <i class="pi text-lg" [ngClass]="option.icon"></i>
            <span class="text-[0.9375rem] font-medium">{{ option.label }}</span>
          </div>
          <i class="pi text-sm transition-transform duration-200"
            [ngClass]="isSubmenuOpen(option) ? 'pi-chevron-down' : 'pi-chevron-right'"></i>
        </button>

        <!-- Molecule Children -->
        <!-- Ojo en este ngIf asegúrate de que tiene la barra invertida cerrada -->
        <div *ngIf="isSubmenuOpen(option)"
          class="ml-4 pl-3 border-l-2 border-slate-200 flex flex-col gap-1 mt-1 animate-fade">
          <a *ngFor="let child of option.children" [routerLink]="child.route"
            routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-900 transition-colors duration-200 min-h-11 text-sm outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
            tabindex="0" [attr.aria-label]="child.label">
            <i class="pi text-md" [ngClass]="child.icon"></i>
            <span>{{ child.label }}</span>
          </a>
        </div>
      </ng-container>

    </ng-container>
  </nav>


  <div class="flex flex-col gap-3 p-6 border-t border-slate-200 w-full mt-auto bg-slate-50">
    <button pButton label="Cuenta" icon="pi pi-user"
      class="w-full min-h-11 text-slate-700! border-slate-300! hover:bg-slate-100! transition-colors focus-visible:ring-2 focus-visible:ring-indigo-500"
      outlined></button>


    <button (click)="onLogout()" pButton label="Salir" icon="pi pi-sign-out"
      class="w-full min-h-11 text-red-600! hover:bg-red-50! transition-colors focus-visible:ring-2 focus-visible:ring-red-500"
      text></button>
  </div>
</aside>
